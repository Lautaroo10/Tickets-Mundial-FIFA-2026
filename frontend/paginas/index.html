<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA WORLD CUP 2026</title>
</head>

<body>

    <header>
        <img src="../images/Logo-Copa-Mundial.png" alt="Logo de la copa del mundo">
        <h1>FIFA WORLD CUP</h1>
    </header>

    <main>
        <h2>PARTIDOS DISPONIBLES</h2>
        <div class="partidos">
            <div class="parte-arriba">
                <p class="dia">16</p>
                <div class="fecha">
                    <p class="dia">Martes</p>
                    <p class="hora">22:00</p>
                </div>
                <img src="../images/Logo-Copa-Mundial.png" alt="Logo de la copa del mundo">
            </div>
            <div class="parte-abajo">
                <div class="escudos">
                    <img class="img-escudos" src="../images/logo-argentina.png" alt="escudo-argentina">
                    <p>VS.</p>
                    <img class="img-escudos" src="../images/logo-argelia.png" alt="escudo-argelia">
                </div>
                <h2 class="selecciones">Argentina - Argelia</h2>
                <p class="estadio">Arrowhead Stadium</p>
                <button class="comprar">Comprar</button>
            </div>
        </div>

    </main>




</body>

</html>
